<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Cockpit · Orbit</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script>
  const TWEAK_DEFAULS = /*EDITMODE-BEGIN*/{
    "name": "Cockpit",
    "accent": [
      "#d65a3a",
      "#fae6dc",
      "#6a4a7a"
    ],
    "density": "comfy",
    "serifHeads": true,
    "radius": 18,
    "showFocus": true,
    "showDigest": true,
    "showCmdHint": true
  }/*EDITMODE-END*/;
  window.__cockpitDefaults = TWEAK_DEFAULS;
</script>
<style>
  :root {
    --bg: #f3efe9;
    --bg-2: #ebe6dc;
    --card: #ffffff;
    --ink: #1a1814;
    --ink-2: #4a463e;
    --mute: #8a8478;
    --line: rgba(26,24,20,0.08);
    --line-2: rgba(26,24,20,0.14);
    --accent: #d65a3a;
    --accent-soft: #fae6dc;
    --accent-deep: #6a4a7a;
    --good: #4a8a5e;
    --warn: #c98a2a;
    --plum: #6a4a7a;
    --sea: #3a7a8a;
    --sans: 'Geist', system-ui, sans-serif;
    --serif: 'Instrument Serif', Georgia, serif;
    --mono: 'Geist Mono', ui-monospace, monospace;
    --radius: 18px;
    --pad: 24px;
    --gap: 16px;
    --row-pad-y: 11px;
    --shadow-sm: 0 1px 2px rgba(26,24,20,.04), 0 0 0 1px var(--line);
    --shadow-md: 0 4px 16px rgba(26,24,20,.06), 0 0 0 1px var(--line);
    --shadow-lg: 0 12px 40px rgba(26,24,20,.10), 0 0 0 1px var(--line);
  }
  html[data-density="dense"] { --pad: 16px; --gap: 12px; --row-pad-y: 8px; }
  html[data-serif="off"] { --serif: 'Geist', system-ui, sans-serif; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: var(--sans); font-size: 13.5px; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    background-image: radial-gradient(circle at 20% 0%, color-mix(in oklab, var(--accent) 6%, transparent), transparent 60%),
                      radial-gradient(circle at 90% 80%, color-mix(in oklab, var(--accent-deep) 6%, transparent), transparent 60%);
    min-height: 100vh;
  }
  .app { padding: 22px 28px 60px; max-width: 1320px; margin: 0 auto; }

  .top { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand .planet { width: 32px; height: 32px; border-radius: 999px; background: radial-gradient(circle at 30% 30%, color-mix(in oklab, var(--accent) 35%, white), var(--accent) 60%, color-mix(in oklab, var(--accent) 80%, black)); position: relative; }
  .brand .planet::after { content: ''; position: absolute; inset: -4px; border-radius: 999px; border: 1.5px solid var(--accent); transform: rotate(-22deg); border-left-color: transparent; border-right-color: transparent; opacity: .4; }
  .brand .name { font-family: var(--serif); font-size: 28px; line-height: 1; letter-spacing: -0.01em; }
  .brand .name em { font-style: italic; color: var(--accent); }
  .top .nav { display: flex; gap: 4px; background: var(--card); border-radius: 999px; padding: 4px; box-shadow: var(--shadow-sm); margin: 0 12px; }
  .top .nav a { padding: 7px 14px; border-radius: 999px; cursor: pointer; font-size: 13px; color: var(--ink-2); font-weight: 500; transition: background .15s, color .15s; }
  .top .nav a:hover { color: var(--ink); }
  .top .nav a.active { background: var(--ink); color: var(--bg); }
  .top .right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; background: var(--card); border-radius: 999px; box-shadow: var(--shadow-sm); font-size: 12px; color: var(--ink-2); }
  .pill .ok { width: 7px; height: 7px; border-radius: 999px; background: var(--good); animation: pulse 2.4s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
  .av { width: 32px; height: 32px; border-radius: 999px; background: linear-gradient(135deg, var(--accent), var(--accent-deep)); color: white; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 13px; box-shadow: var(--shadow-sm); cursor: pointer; }

  .hero { display: grid; grid-template-columns: 1.6fr 1fr; gap: var(--gap); margin-bottom: 22px; }
  .hello { background: var(--card); border-radius: var(--radius); padding: var(--pad) calc(var(--pad) + 2px); box-shadow: var(--shadow-md); position: relative; overflow: hidden; }
  .hello::before { content: ''; position: absolute; right: -40px; top: -40px; width: 200px; height: 200px; border-radius: 999px; background: radial-gradient(circle, var(--accent-soft), transparent 70%); }
  .hello .greet { font-size: 12px; color: var(--mute); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; font-weight: 500; }
  .hello h1 { font-family: var(--serif); font-size: 44px; line-height: 1.05; letter-spacing: -0.01em; margin: 0 0 12px; font-weight: 400; }
  .hello h1 em { font-style: italic; color: var(--accent); }
  .hello .summary { color: var(--ink-2); font-size: 14px; line-height: 1.6; margin-bottom: 18px; max-width: 520px; }
  .hello .summary b { color: var(--ink); font-weight: 600; }
  .hello .stats { display: flex; gap: 22px; padding-top: 16px; border-top: 1px solid var(--line); flex-wrap: wrap; }
  .hello .stat .v { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; font-feature-settings: 'tnum'; }
  .hello .stat .v small { font-size: 12px; color: var(--good); margin-left: 4px; font-weight: 500; }
  .hello .stat .l { font-size: 11px; color: var(--mute); margin-top: 1px; }

  .focus { background: var(--card); border-radius: var(--radius); padding: 20px 22px; box-shadow: var(--shadow-md); position: relative; }
  .focus h3 { font-family: var(--serif); font-size: 22px; font-weight: 400; margin: 0 0 4px; }
  .focus h3 em { font-style: italic; color: var(--accent); }
  .focus .when { font-size: 11.5px; color: var(--mute); margin-bottom: 12px; font-family: var(--mono); }
  .focus ul { list-style: none; padding: 0; margin: 0; }
  .focus li { padding: 8px 0; display: flex; align-items: center; gap: 10px; font-size: 13.5px; cursor: pointer; border-top: 1px solid var(--line); }
  .focus li:first-child { border-top: none; }
  .focus li .check { width: 16px; height: 16px; border-radius: 999px; border: 1.5px solid var(--line-2); flex-shrink: 0; transition: background .15s, border-color .15s; }
  .focus li.done .check { background: var(--good); border-color: var(--good); position: relative; }
  .focus li.done .check::after { content: '✓'; position: absolute; inset: 0; color: white; font-size: 10px; display: flex; align-items: center; justify-content: center; }
  .focus li.done span { color: var(--mute); text-decoration: line-through; }

  .section-h { display: flex; align-items: baseline; justify-content: space-between; margin: 8px 0 12px; }
  .section-h h2 { font-family: var(--serif); font-size: 20px; font-weight: 400; margin: 0; }
  .section-h h2 em { font-style: italic; color: var(--accent); }
  .section-h .more { font-size: 12.5px; color: var(--mute); cursor: pointer; }

  .missions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: var(--gap); margin-bottom: 28px; }
  .mission { background: var(--card); border-radius: var(--radius); padding: 0; box-shadow: var(--shadow-md); cursor: pointer; transition: transform .2s ease, box-shadow .2s ease; overflow: hidden; }
  .mission:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
  .mission .thumb { height: 88px; position: relative; overflow: hidden; }
  .mission.alvarny .thumb { background: linear-gradient(135deg, #1a1814, #2a2520); }
  .mission.alvarny .thumb::before { content: 'alvarny'; position: absolute; left: 18px; top: 50%; transform: translateY(-50%); font-family: var(--serif); font-size: 26px; font-style: italic; color: rgba(255,255,255,.95); }
  .mission.alvarny .thumb::after { content: ''; position: absolute; right: -20px; bottom: -20px; width: 80px; height: 80px; border-radius: 999px; border: 1px solid rgba(255,255,255,.15); }
  .mission.studios .thumb { background: linear-gradient(135deg, #d6a87a, #c98a4a); }
  .mission.studios .thumb::before { content: 'studios'; position: absolute; left: 18px; top: 50%; transform: translateY(-50%); font-family: var(--serif); font-size: 26px; font-style: italic; color: rgba(255,255,255,.95); }
  .mission.studios .thumb::after { content: ''; position: absolute; right: 16px; top: 16px; bottom: 16px; width: 1px; background: rgba(255,255,255,.4); box-shadow: -8px 0 0 rgba(255,255,255,.4), -16px 0 0 rgba(255,255,255,.4); }
  .mission.labs .thumb { background: linear-gradient(135deg, var(--accent-deep), color-mix(in oklab, var(--accent-deep) 70%, black)); }
  .mission.labs .thumb::before { content: 'labs'; position: absolute; left: 18px; top: 50%; transform: translateY(-50%); font-family: var(--serif); font-size: 26px; font-style: italic; color: rgba(255,255,255,.95); }
  .mission.labs .thumb::after { content: ''; position: absolute; right: 18px; top: 18px; width: 38px; height: 38px; border-radius: 999px; background: radial-gradient(circle at 30% 30%, color-mix(in oklab, var(--accent) 35%, white), var(--accent) 70%); }
  .mission .badge { position: absolute; top: 14px; right: 14px; padding: 3px 8px; background: rgba(255,255,255,.18); backdrop-filter: blur(8px); border-radius: 999px; color: white; font-size: 10.5px; font-family: var(--mono); letter-spacing: 0.04em; border: 1px solid rgba(255,255,255,.2); }
  .mission .body { padding: 16px 18px 18px; }
  .mission h3 { font-family: var(--serif); font-size: 22px; font-weight: 400; margin: 0 0 2px; letter-spacing: -0.01em; }
  .mission .domain { font-family: var(--mono); font-size: 11.5px; color: var(--mute); margin-bottom: 14px; }
  .mission .blurb { font-size: 13px; line-height: 1.5; color: var(--ink-2); margin-bottom: 14px; min-height: 38px; }
  .mission .grid4 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 14px; padding-top: 12px; border-top: 1px solid var(--line); }
  .mission .stat .v { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; font-feature-settings: 'tnum'; }
  .mission .stat .v small { font-size: 11px; color: var(--good); font-weight: 500; margin-left: 4px; }
  .mission .stat .v small.down { color: var(--accent); }
  .mission .stat .l { font-size: 10.5px; color: var(--mute); margin-top: 1px; }
  .mission .meta-row { display: flex; gap: 6px; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--line); flex-wrap: wrap; }
  .chip { padding: 3px 8px; background: var(--bg-2); border-radius: 6px; font-family: var(--mono); font-size: 10.5px; color: var(--ink-2); }
  .chip.good { background: color-mix(in oklab, var(--good) 14%, transparent); color: var(--good); }
  .chip.warn { background: color-mix(in oklab, var(--warn) 16%, transparent); color: var(--warn); }

  .grid-2 { display: grid; grid-template-columns: 1.5fr 1fr; gap: var(--gap); margin-bottom: 22px; }

  .digest { background: var(--card); border-radius: var(--radius); padding: var(--pad); box-shadow: var(--shadow-md); position: relative; overflow: hidden; }
  .digest .head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; }
  .digest h3 { font-family: var(--serif); font-size: 24px; font-weight: 400; margin: 0; }
  .digest h3 em { font-style: italic; color: var(--accent); }
  .digest .when { font-family: var(--mono); font-size: 11px; color: var(--mute); }
  .digest p { font-size: 14.5px; line-height: 1.65; color: var(--ink-2); margin: 0 0 16px; }
  .digest p b { color: var(--ink); font-weight: 600; }
  .digest ul { list-style: none; padding: 0; margin: 0; border-top: 1px solid var(--line); }
  .digest li { padding: 10px 0; border-bottom: 1px solid var(--line); display: grid; grid-template-columns: 70px 1fr auto; gap: 14px; align-items: center; cursor: pointer; transition: padding .15s; }
  .digest li:hover { padding-left: 6px; }
  .digest li:last-child { border-bottom: none; }
  .digest li .src { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--accent); }
  .digest li .ttl { font-size: 13.5px; color: var(--ink); }
  .digest li .ttl em { font-style: italic; color: var(--accent); }
  .digest li .when { font-family: var(--mono); font-size: 10.5px; color: var(--mute); }

  .tickets { background: var(--card); border-radius: var(--radius); padding: var(--pad); box-shadow: var(--shadow-md); }
  .tickets h3 { font-family: var(--serif); font-size: 24px; font-weight: 400; margin: 0 0 4px; }
  .tickets h3 em { font-style: italic; color: var(--accent); }
  .tickets .sub { font-size: 12.5px; color: var(--mute); margin-bottom: 14px; }
  .compose { background: var(--bg); border-radius: 12px; padding: 12px 14px; margin-bottom: 12px; transition: box-shadow .15s; border: 1px solid var(--line); }
  .compose:focus-within { background: var(--card); box-shadow: 0 0 0 2px var(--accent-soft); border-color: var(--accent); }
  .compose textarea { width: 100%; resize: none; border: none; outline: none; font-family: inherit; font-size: 13.5px; line-height: 1.5; min-height: 50px; color: var(--ink); background: transparent; }
  .compose textarea::placeholder { color: var(--mute); }
  .compose .row { display: flex; align-items: center; gap: 6px; padding-top: 8px; border-top: 1px solid var(--line); }
  .seg { display: inline-flex; gap: 4px; }
  .seg button { padding: 4px 9px; border-radius: 999px; background: transparent; border: 1px solid var(--line-2); cursor: pointer; font-family: var(--mono); font-size: 10.5px; color: var(--ink-2); }
  .seg button.on.alvarny { background: var(--ink); color: white; border-color: var(--ink); }
  .seg button.on.studios { background: #c98a4a; color: white; border-color: #c98a4a; }
  .seg button.on.labs { background: var(--accent-deep); color: white; border-color: var(--accent-deep); }
  .btn { padding: 7px 14px; border-radius: 8px; border: 1px solid var(--line-2); background: var(--card); cursor: pointer; font-size: 12.5px; font-family: inherit; font-weight: 500; color: var(--ink); }
  .btn:hover { background: var(--bg); }
  .btn.primary { background: var(--ink); color: white; border-color: var(--ink); }
  .btn.primary:hover { background: var(--accent); border-color: var(--accent); }
  .btn.accent { background: var(--accent); color: white; border-color: var(--accent); }

  .ticket-list { list-style: none; padding: 0; margin: 0; }
  .ticket-list li { padding: var(--row-pad-y) 0; border-top: 1px solid var(--line); display: grid; grid-template-columns: 56px 1fr auto; gap: 12px; align-items: center; cursor: pointer; transition: padding .15s; }
  .ticket-list li:hover { padding-left: 6px; }
  .ticket-list .id { font-family: var(--mono); font-size: 11px; color: var(--mute); }
  .ticket-list .ttl { font-size: 13.5px; color: var(--ink); font-weight: 500; }
  .ticket-list .ttl small { display: block; font-size: 11.5px; color: var(--mute); font-weight: 400; margin-top: 1px; }
  .ticket-list .right { display: flex; gap: 6px; align-items: center; }
  .site-pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px; border-radius: 999px; font-size: 10.5px; font-weight: 500; font-family: var(--mono); }
  .site-pill::before { content:''; width:6px; height:6px; border-radius:999px; }
  .site-pill.alvarny { background: var(--bg-2); color: var(--ink); }
  .site-pill.alvarny::before { background: var(--ink); }
  .site-pill.studios { background: rgba(201,138,74,.12); color: #b07028; }
  .site-pill.studios::before { background: #c98a4a; }
  .site-pill.labs { background: color-mix(in oklab, var(--accent-deep) 14%, transparent); color: var(--accent-deep); }
  .site-pill.labs::before { background: var(--accent-deep); }
  .status-pill { padding: 3px 9px; border-radius: 999px; font-size: 10.5px; font-weight: 500; font-family: var(--mono); }
  .status-pill.idea { background: var(--bg-2); color: var(--ink-2); }
  .status-pill.prompt { background: var(--accent-soft); color: var(--accent); }
  .status-pill.progress { background: rgba(201,138,42,.14); color: var(--warn); }
  .status-pill.shipped { background: rgba(74,138,94,.14); color: var(--good); }

  .drawer-mask { position: fixed; inset: 0; background: rgba(26,24,20,.36); display: none; z-index: 30; backdrop-filter: blur(2px); }
  .drawer-mask.on { display: block; }
  .drawer { position: fixed; top: 16px; right: 16px; bottom: 16px; width: 540px; background: var(--card); border-radius: var(--radius); box-shadow: 0 24px 60px rgba(0,0,0,.18); z-index: 31; display: flex; flex-direction: column; transform: translateX(calc(100% + 32px)); transition: transform .3s cubic-bezier(.4,0,.2,1); }
  .drawer.on { transform: translateX(0); }
  .drawer .h { padding: 18px 22px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; }
  .drawer .h h4 { font-family: var(--serif); font-size: 20px; font-weight: 400; margin: 0; }
  .drawer .h .id { font-family: var(--mono); font-size: 11px; color: var(--mute); }
  .drawer .b { padding: 18px 22px; flex: 1; overflow: auto; }
  .drawer .label { font-size: 10.5px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--mute); margin: 14px 0 6px; }
  .drawer .raw { background: var(--bg); padding: 12px 14px; border-radius: 10px; font-size: 13.5px; color: var(--ink-2); }
  .drawer .prompt { font-family: var(--mono); font-size: 11.5px; line-height: 1.55; padding: 14px 16px; background: #1a1814; color: #f3efe9; border-radius: 12px; white-space: pre-wrap; }
  .drawer .foot { padding: 14px 22px; border-top: 1px solid var(--line); display: flex; gap: 8px; }

  .ledger { background: var(--card); border-radius: var(--radius); padding: var(--pad); box-shadow: var(--shadow-md); margin-bottom: 18px; }
  .ledger-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 14px; margin-bottom: 22px; }
  .lcard { padding: 14px 16px; background: var(--bg); border-radius: 12px; }
  .lcard .l { font-size: 11.5px; color: var(--mute); }
  .lcard .v { font-size: 22px; font-weight: 600; margin-top: 2px; font-feature-settings: 'tnum'; letter-spacing: -0.01em; }
  .lcard .v small { font-size: 11.5px; font-weight: 500; color: var(--good); margin-left: 4px; }
  .lcard .v small.down { color: var(--accent); }

  .vendor-list { list-style: none; padding: 0; margin: 0; }
  .vendor-list li { padding: 12px 0; border-top: 1px solid var(--line); display: grid; grid-template-columns: 28px 1fr 100px 110px 90px; gap: 14px; align-items: center; }
  .vendor-list li .ic { width: 28px; height: 28px; border-radius: 8px; background: var(--bg-2); display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--ink-2); }
  .vendor-list li .ic.api { background: linear-gradient(135deg, var(--accent), var(--accent-deep)); color: white; }
  .vendor-list li .name { font-weight: 500; font-size: 13.5px; }
  .vendor-list li .name small { display: block; font-weight: 400; font-size: 11.5px; color: var(--mute); margin-top: 1px; font-family: var(--mono); }
  .vendor-list li .cat { font-family: var(--mono); font-size: 11px; color: var(--mute); }
  .vendor-list li .scope { font-family: var(--mono); font-size: 11px; color: var(--ink-2); }
  .vendor-list li .amt { font-family: var(--mono); font-weight: 600; text-align: right; font-size: 14px; }

  .cmd-mask { position: fixed; inset: 0; background: rgba(26,24,20,.32); display: none; align-items: flex-start; justify-content: center; z-index: 50; padding-top: 110px; backdrop-filter: blur(4px); }
  .cmd-mask.on { display: flex; }
  .cmd { width: 580px; background: var(--card); border-radius: 16px; box-shadow: 0 24px 60px rgba(0,0,0,.2); overflow: hidden; }
  .cmd input { width: 100%; padding: 16px 18px; border: none; outline: none; font-family: var(--serif); font-size: 18px; border-bottom: 1px solid var(--line); background: transparent; }
  .cmd .res { padding: 6px; max-height: 320px; overflow: auto; }
  .cmd .res .grp { font-size: 10.5px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--mute); padding: 8px 10px 4px; }
  .cmd .res .item { padding: 8px 10px; border-radius: 8px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 13.5px; }
  .cmd .res .item.sel { background: var(--bg); }
  .cmd .res .item .k { margin-left: auto; font-family: var(--mono); font-size: 10.5px; color: var(--mute); }

  .login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; align-items: center; justify-content: center; transition: opacity .35s; background-image: radial-gradient(circle at 20% 30%, color-mix(in oklab, var(--accent) 12%, transparent), transparent 50%), radial-gradient(circle at 80% 70%, color-mix(in oklab, var(--accent-deep) 10%, transparent), transparent 50%); }
  .login-overlay.gone { opacity: 0; pointer-events: none; }
  .login-card { width: 400px; background: var(--card); border-radius: 22px; padding: 32px 32px 28px; box-shadow: 0 16px 48px rgba(0,0,0,.10), 0 0 0 1px var(--line); }
